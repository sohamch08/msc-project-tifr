name: Compile LaTeX and Release PDF

on:
  push:
    tags:
      - 'v*'          # Trigger on version tags like v1.0, v2.1.3
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write     # Needed to create GitHub Releases

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      MAIN_TEX: msc-project.tex   # Main LaTeX source file
      OUTPUT_PDF: output.pdf      # <-- Change this to your desired output PDF name

    steps:
      # ── 1. Checkout repository ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install TeX Live with all required packages ───────────────────────
      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-base \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-science \
            biber \
            latexmk \
            make

      # ── 3. Compile LaTeX (pdflatex → bibtex → pdflatex × 2) ─────────────────
      #
      #   Full compilation sequence for bibliography support:
      #     Pass 1 – pdflatex  : generates .aux with \citation keys
      #     Pass 2 – bibtex    : reads .bib, writes .bbl
      #     Pass 3 – pdflatex  : includes the bibliography
      #     Pass 4 – pdflatex  : resolves all cross-references & page numbers
      #
      - name: Compile LaTeX document
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_TEX"
          bibtex "${MAIN_TEX%.tex}"
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_TEX"
          pdflatex -interaction=nonstopmode -halt-on-error "$MAIN_TEX"

      # ── 4. Rename compiled PDF to the desired output name ────────────────────
      - name: Rename output PDF
        run: |
          BASENAME="${MAIN_TEX%.tex}"
          if [ "$BASENAME.pdf" != "$OUTPUT_PDF" ]; then
            mv "${BASENAME}.pdf" "$OUTPUT_PDF"
          fi
          echo "PDF ready: $OUTPUT_PDF"
          ls -lh "$OUTPUT_PDF"

      # ── 5. Upload PDF as a build artifact (visible on the Actions run page) ──
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-pdf
          path: ${{ env.OUTPUT_PDF }}
          retention-days: 30

      # ── 6. Determine release tag ─────────────────────────────────────────────
      - name: Set release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=manual-$(date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          fi

      # ── 7. Create GitHub Release and attach the PDF ──────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Release ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 📄 Compiled PDF

            This release was generated automatically by the **Compile LaTeX** workflow.

            | Field        | Value |
            |-------------|-------|
            | Source file  | `${{ env.MAIN_TEX }}` |
            | Compiled on  | `${{ runner.os }}` |
            | Commit SHA   | `${{ github.sha }}` |

            Download the PDF from the assets below.
          files: ${{ env.OUTPUT_PDF }}
          draft: false
          prerelease: false
